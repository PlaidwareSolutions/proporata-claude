components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: auth_token
  schemas:
    GlossaryTerm:
      type: object
      properties:
        id: { type: integer }
        termKey: { type: string }
        title: { type: string }
        category:
          type: string
          enum: [governance, maintenance, property, compliance, financials, community]
        shortDef: { type: string }
        longDef: { type: string }
        seeAlsoRoute: { type: string, nullable: true }
        published: { type: boolean }
        sortOrder: { type: integer }
        routes:
          type: array
          items: { type: string }
        createdAt: { type: string }
        updatedAt: { type: string }
      required:
        - id
        - termKey
        - title
        - category
        - shortDef
        - longDef
        - published
        - sortOrder
        - routes
        - createdAt
        - updatedAt
    CreateGlossaryTermBody:
      type: object
      properties:
        termKey: { type: string }
        title: { type: string }
        category: { type: string }
        shortDef: { type: string }
        longDef: { type: string }
        seeAlsoRoute: { type: string, nullable: true }
        published: { type: boolean }
        routes:
          type: array
          items: { type: string }
      required: [termKey, title, category, shortDef]
    UpdateGlossaryTermBody:
      type: object
      properties:
        title: { type: string }
        category: { type: string }
        shortDef: { type: string }
        longDef: { type: string }
        seeAlsoRoute: { type: string, nullable: true }
        published: { type: boolean }
        routes:
          type: array
          items: { type: string }
    GlossaryEditHistory:
      type: object
      properties:
        id: { type: integer }
        termId: { type: integer }
        termKey: { type: string }
        action: { type: string }
        actorUserId: { type: integer, nullable: true }
        actorName: { type: string }
        diff: { type: object, additionalProperties: true, nullable: true }
        createdAt: { type: string }
      required: [id, termId, termKey, action, actorName, createdAt]
    GlossarySuggestion:
      type: object
      properties:
        id: { type: integer }
        termId: { type: integer }
        termKey: { type: string }
        termTitle: { type: string }
        proposedTitle: { type: string }
        proposedShortDef: { type: string }
        proposedLongDef: { type: string }
        reason: { type: string }
        status: { type: string, enum: [pending, accepted, rejected] }
        submittedByUserId: { type: integer, nullable: true }
        submittedByName: { type: string }
        reviewedByUserId: { type: integer, nullable: true }
        reviewedByName: { type: string }
        reviewNote: { type: string }
        createdAt: { type: string }
        reviewedAt: { type: string, nullable: true }
      required:
        - id
        - termId
        - termKey
        - termTitle
        - proposedTitle
        - proposedShortDef
        - proposedLongDef
        - reason
        - status
        - submittedByName
        - reviewedByName
        - reviewNote
        - createdAt
    SuggestGlossaryEditBody:
      type: object
      properties:
        proposedTitle: { type: string }
        proposedShortDef: { type: string }
        proposedLongDef: { type: string }
        reason: { type: string }
    GlossaryCoverage:
      type: object
      properties:
        pagesWithoutTerms:
          type: array
          items: { type: string }
        termsWithoutPages:
          type: array
          items:
            type: object
            properties:
              termKey: { type: string }
              title: { type: string }
            required: [termKey, title]
        knownPages:
          type: array
          items: { type: string }
      required: [pagesWithoutTerms, termsWithoutPages, knownPages]
    UserOnboarding:
      type: object
      properties:
        userId: { type: integer }
        tourCompleted: { type: boolean }
        tourCompletedAt: { type: string, nullable: true }
        tourReplayedAt: { type: string, nullable: true }
        tourVersionSeen:
          type: integer
          nullable: true
          description: |
            Highest org-wide tour version this user has dismissed. The
            organization-wide `currentTourVersion` is bumped by admins after
            major releases; when `tourVersionSeen` is null or lower than
            `currentTourVersion`, the welcome tour opens again automatically.
        currentTourVersion:
          type: integer
          description: |
            Org-wide tour version (mirrored from organization settings) so the
            client can compare without an extra request.
        updatedAt: { type: string }
      required: [userId, tourCompleted, currentTourVersion, updatedAt]
    ChargingPort:
      type: object
      properties:
        id:
          type: integer
        amenityId:
          type: integer
        name:
          type: string
        location:
          type: string
          nullable: true
        connectorType:
          type: string
        maxKw:
          type: number
        provider:
          type: string
          enum:
            - manual
            - stub_http
        providerConfig:
          type: object
          additionalProperties: true
        mode:
          type: string
          enum:
            - reserved
            - fcfs
            - reserved_fcfs
        perKwhCents:
          type: integer
        idlePerMinuteCents:
          type: integer
        idleGraceMinutes:
          type: integer
        idleCapCents:
          type: integer
        noShowFeeCents:
          type: integer
        noShowGraceMinutes:
          type: integer
        enabled:
          type: boolean
        sortOrder:
          type: integer
      required:
        - id
        - amenityId
        - name
        - connectorType
        - maxKw
        - provider
        - mode
        - perKwhCents
        - idlePerMinuteCents
        - idleGraceMinutes
        - idleCapCents
        - noShowFeeCents
        - noShowGraceMinutes
        - enabled
        - sortOrder
    CreateChargingPortBody:
      type: object
      properties:
        name:
          type: string
        location:
          type: string
          nullable: true
        connectorType:
          type: string
        maxKw:
          type: number
        provider:
          type: string
        providerConfig:
          type: object
          additionalProperties: true
        mode:
          type: string
        perKwhCents:
          type: integer
        idlePerMinuteCents:
          type: integer
        idleGraceMinutes:
          type: integer
        idleCapCents:
          type: integer
        noShowFeeCents:
          type: integer
        noShowGraceMinutes:
          type: integer
        enabled:
          type: boolean
        sortOrder:
          type: integer
      required:
        - name
    UpdateChargingPortBody:
      allOf:
        - $ref: '#/components/schemas/CreateChargingPortBody'
    ChargingReservation:
      type: object
      properties:
        id:
          type: integer
        portId:
          type: integer
        ownerUserId:
          type: integer
        unitId:
          type: string
          nullable: true
        startsAt:
          type: string
        endsAt:
          type: string
        status:
          type: string
          enum:
            - pending
            - active
            - completed
            - cancelled
            - no_show
        sessionId:
          type: integer
          nullable: true
        noShowFeeLedgerEntryId:
          type: integer
          nullable: true
        cancelledAt:
          type: string
          nullable: true
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
