  /api/resolutions:
    get:
      tags:
        - Resolutions
      summary: List board resolutions
      description: |
        Lists resolutions wrapping motions of kind `resolution`. Supports filters
        on status (`active`, `all`, `draft`, `adopted`, `superseded`, `rescinded`),
        category, and a free-text search over title and number.
      parameters:
        - in: query
          name: status
          schema:
            type: string
        - in: query
          name: category
          schema:
            type: string
        - in: query
          name: search
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Resolution'
    post:
      tags:
        - Resolutions
      summary: Draft a new resolution
      description: |
        Drafts the underlying motion of kind `resolution`. The official HOA number
        is assigned only when the motion is adopted. Optionally records that this
        resolution will supersede an existing one.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
                - category
              properties:
                title:
                  type: string
                body:
                  type: string
                category:
                  type: string
                  enum:
                    - architectural
                    - financial
                    - rules
                    - personnel
                    - emergency
                    - other
                votingRule:
                  type: object
                closesAt:
                  type: string
                  format: date-time
                  nullable: true
                supersedesResolutionId:
                  type: integer
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  motionId:
                    type: integer
  /api/resolutions/{id}:
    get:
      tags:
        - Resolutions
      summary: Get a resolution and its supersede chain
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Resolution'
                  - type: object
                    properties:
                      supersedes:
                        nullable: true
                        type: object
                        properties:
                          id:
                            type: integer
                          number:
                            type: string
                            nullable: true
                          title:
                            type: string
                      supersededBy:
                        nullable: true
                        type: object
                        properties:
                          id:
                            type: integer
                          number:
                            type: string
                            nullable: true
                          title:
                            type: string
        '404':
          description: Not found
  /api/resolutions/{id}/supersede:
