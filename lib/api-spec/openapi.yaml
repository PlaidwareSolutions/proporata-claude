openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: users
    description: User management operations
  - name: buildings
    description: Building operations
  - name: units
    description: Unit operations
  - name: work-orders
    description: Work order operations
  - name: insurance
    description: Insurance policy operations
  - name: documents
    description: Document operations
  - name: vendors
    description: Vendor operations
  - name: settings
    description: Settings operations
  - name: storage
    description: Object storage upload and serving endpoints
  - name: integrations
    description: Third-party integration operations
  - name: notifications
    description: Notification operations
  - name: communications
    description: Communications and broadcast operations
  - name: announcements
    description: Community announcements operations
  - name: reports
    description: Reporting and analytics operations
  - name: billing
    description: Owner accounts and ledger operations
  - name: motions
    description: Owner accounts and ledger operations
  - name: calendar
    description: Board motions and voting operations
  - name: meetings
    description: Board meeting CRUD, agendas, attendance, lifecycle, minutes, PDFs, and ICS feeds
  - name: governance
    description: Organization-level governance settings (notice and quorum)
  - name: members
    description: Membership roster (one row per unit; owners only) and ownership-status admin overrides
  - name: glossary
    description: Help glossary, contextual help, and onboarding tour
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags:
        - health
      summary: Health check
      description: Returns server health status
      responses:
        '200':
          description: Healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'
  /auth/login:
    post:
      operationId: login
      tags:
        - auth
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginBody'
      responses:
        '200':
          description: Authenticated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Invalid credentials
  /auth/logout:
    post:
      operationId: logout
      tags:
        - auth
      summary: Logout and clear session cookie
      responses:
        '200':
          description: Logged out
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                required:
                  - ok
  /auth/me:
    get:
      operationId: getMe
      tags:
        - auth
      summary: Get the currently authenticated user
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Unauthorized
  /auth/invite/{token}:
    get:
      operationId: getInvite
      tags:
        - auth
      summary: Public preview of a pending invite (used by /accept-invite/:token)
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Invite preview
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvitePreview'
        '404':
          description: Invalid or already-used invite token
        '410':
          description: Expired invite token
  /auth/accept-invite:
    post:
      operationId: acceptInvite
      tags:
        - auth
      summary: Set a password for a pending user using an invite token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AcceptInviteBody'
      responses:
        '200':
          description: Authenticated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Validation error
        '404':
          description: Invalid or already-used invite token
        '410':
          description: Expired invite token
  /users:
    get:
      operationId: listUsers
      tags:
        - users
      summary: List all users (admin only)
      security:
        - cookieAuth: []
      responses:
        '200':
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
  /users/invite:
    post:
      operationId: inviteUser
      tags:
        - users
      summary: Invite a new user (admin only)
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InviteUserBody'
      responses:
        '201':
          description: Created user with single-use invite token + URL
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InviteUserResponse'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '409':
          description: Email already exists
  /users/{id}/invite/resend:
    post:
      operationId: resendInvite
      tags:
        - users
      summary: Regenerate an invite token for a still-pending user (admin only)
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: New invite token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InviteUserResponse'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not found
        '409':
          description: User already accepted invite
  /users/{id}/role:
    patch:
      operationId: updateUserRole
      tags:
        - users
      summary: Update a user's role (admin only)
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRoleBody'
      responses:
        '200':
          description: Updated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not found
        '409':
          description: Cannot demote the last remaining Admin
  /users/{id}:
    delete:
      operationId: deleteUser
      tags:
        - users
      summary: Delete a user (admin only)
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Deleted
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not found
  /users/{id}/board-member:
    patch:
      operationId: updateUserBoardMember
      tags:
        - users
      summary: Toggle the board-member flag on a user (admin only)
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateBoardMemberBody'
      responses:
        '200':
          description: Updated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not found
        '409':
          description: Cannot remove the last remaining board member
  /users/{id}/board-member-history:
    get:
      operationId: listUserBoardMemberHistory
      tags:
        - users
      summary: List the audit history of board-flag changes for a user (admin only)
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Audit entries, newest first
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BoardMemberAuditEntry'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not found
  /users/{id}/officer:
    patch:
      operationId: updateUserOfficer
      tags:
        - users
      summary: Set officer title and/or term dates on a board member (admin only)
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateOfficerBody'
      responses:
        '200':
          description: Updated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Invalid input or user is not a board member
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not found
        '409':
          description: Officer title already held by another user
  /board/history:
    get:
      operationId: listBoardHistory
      tags:
        - users
      summary: List board membership and officer change history
      security:
        - cookieAuth: []
      responses:
        '200':
          description: History entries (most recent first)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BoardHistoryEntry'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
  /board/at:
    get:
      operationId: getBoardAtDate
      tags:
        - users
      summary: List board members active on a given date (defaults to today)
      security:
        - cookieAuth: []
      parameters:
        - name: date
          in: query
          required: false
          schema:
            type: string
          description: ISO date YYYY-MM-DD. Defaults to today.
      responses:
        '200':
          description: Roster active on the given date
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BoardRosterResponse'
        '400':
          description: Invalid date
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
  /users/{id}/unit:
    patch:
      operationId: assignUserUnit
      tags:
        - users
      summary: Assign a unit to a resident user (admin only)
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignUnitBody'
      responses:
        '200':
          description: Updated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not found
  /buildings:
    get:
      operationId: listBuildings
      tags:
        - buildings
      summary: List all buildings
      security:
        - cookieAuth: []
      responses:
        '200':
          description: List of buildings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Building'
    post:
      operationId: createBuilding
      tags:
        - buildings
      summary: Create a building
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBuildingBody'
      responses:
        '201':
          description: Created building
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Building'
  /buildings/{id}:
    get:
      operationId: getBuilding
      tags:
        - buildings
      summary: Get a building by number
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Building
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Building'
        '404':
          description: Not found
    patch:
      operationId: updateBuilding
      tags:
        - buildings
      summary: Update a building
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateBuildingBody'
      responses:
        '200':
          description: Updated building
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Building'
        '404':
          description: Not found
    delete:
      operationId: deleteBuilding
      tags:
        - buildings
      summary: Delete a building
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Deleted
        '404':
          description: Not found
  /units:
    get:
      operationId: listUnits
      tags:
        - units
      summary: List all units
      security:
        - cookieAuth: []
      parameters:
        - name: building
          in: query
          required: false
          schema:
            type: integer
      responses:
        '200':
          description: List of units
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Unit'
    post:
      operationId: createUnit
      tags:
        - units
      summary: Create a unit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUnitBody'
      responses:
        '201':
          description: Created unit
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Unit'
  /units/{id}:
    get:
      operationId: getUnit
      tags:
        - units
      summary: Get a unit by ID
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Unit
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Unit'
        '404':
          description: Not found
    patch:
      operationId: updateUnit
      tags:
        - units
      summary: Update a unit
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUnitBody'
      responses:
        '200':
          description: Updated unit
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Unit'
        '404':
          description: Not found
    delete:
      operationId: deleteUnit
      tags:
        - units
      summary: Delete a unit
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Deleted
        '404':
          description: Not found
  /work-orders:
    get:
      operationId: listWorkOrders
      tags:
        - work-orders
      summary: List all work orders
      security:
        - cookieAuth: []
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
        - name: building
          in: query
          required: false
          schema:
            type: integer
        - name: unit
          in: query
          required: false
          schema:
            type: string
        - name: historical
          in: query
          required: false
          description: Filter by historical flag — `true` returns only historical (backfilled) work orders, `false` returns only current operational work orders, `all` returns both. Defaults to excluding historical entries.
          schema:
            type: string
            enum:
              - "true"
              - "false"
              - all
      responses:
        '200':
          description: List of work orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WorkOrder'
    post:
      operationId: createWorkOrder
      tags:
        - work-orders
      summary: Create a work order
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWorkOrderBody'
      responses:
        '201':
          description: Created work order
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkOrder'
  /work-orders/{id}:
    get:
      operationId: getWorkOrder
      tags:
        - work-orders
      summary: Get a work order by ID
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Work order
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkOrder'
        '404':
          description: Not found
    patch:
      operationId: updateWorkOrder
      tags:
        - work-orders
      summary: Update a work order
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateWorkOrderBody'
      responses:
        '200':
          description: Updated work order
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkOrder'
        '404':
          description: Not found
    delete:
      operationId: deleteWorkOrder
      tags:
        - work-orders
      summary: Delete a work order
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Deleted
        '404':
          description: Not found
  /work-orders/{id}/events:
    get:
      operationId: listWorkOrderEvents
      tags:
        - work-orders
      summary: List events and attachments for a work order
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Events with attachments
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkOrderActivity'
        '403':
          description: Access denied
        '404':
          description: Not found
  /work-orders/{id}/comments:
    post:
      operationId: createWorkOrderComment
      tags:
        - work-orders
      summary: Add a comment to a work order
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWorkOrderCommentBody'
      responses:
        '201':
          description: Comment created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkOrderEvent'
        '403':
          description: Access denied
        '404':
          description: Not found
  /work-orders/{id}/comments/{eventId}:
    patch:
      operationId: updateWorkOrderComment
      tags:
        - work-orders
      summary: Edit an existing comment (author or manager moderation)
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWorkOrderCommentBody'
      responses:
        '200':
          description: Comment updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkOrderEvent'
        '403':
          description: Access denied
        '404':
          description: Not found
    delete:
      operationId: deleteWorkOrderComment
      tags:
        - work-orders
      summary: Soft-delete a comment (author or manager)
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Comment deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkOrderEvent'
        '403':
          description: Access denied
        '404':
          description: Not found
  /work-orders/{id}/attachments:
    post:
      operationId: createWorkOrderAttachment
      tags:
        - work-orders
      summary: Register an uploaded photo as a work-order attachment
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWorkOrderAttachmentBody'
      responses:
        '201':
          description: Attachment registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkOrderAttachment'
        '403':
          description: Access denied
        '404':
          description: Not found
  /work-orders/{id}/attachments/{attId}:
    delete:
      operationId: deleteWorkOrderAttachment
      tags:
        - work-orders
      summary: Delete a work-order attachment (manager only)
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: attId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Deleted
        '403':
          description: Access denied
        '404':
          description: Not found
  /insurance:
    get:
      operationId: listInsurance
      tags:
        - insurance
      summary: List all insurance policies
      security:
        - cookieAuth: []
      responses:
        '200':
          description: List of insurance policies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/InsurancePolicy'
  /insurance/{id}:
    get:
      operationId: getInsurance
      tags:
        - insurance
      summary: Get an insurance policy by building number
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Insurance policy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InsurancePolicy'
        '404':
          description: Not found
    patch:
      operationId: updateInsurance
      tags:
        - insurance
      summary: Update an insurance policy
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateInsuranceBody'
      responses:
        '200':
          description: Updated insurance policy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InsurancePolicy'
        '404':
          description: Not found
  /insurance/{id}/history:
    get:
      operationId: listInsurancePolicyHistory
      tags: [insurance]
      summary: List previous (closed) insurance policies for a building
      security: [{ cookieAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Previous policies, newest first
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/InsurancePolicyHistory' }
    post:
      operationId: createInsurancePolicyHistory
      tags: [insurance]
      summary: Manually backfill a previously-held insurance policy
      security: [{ cookieAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateInsurancePolicyHistoryBody' }
      responses:
        '201':
          description: Created history entry
          content:
            application/json:
              schema: { $ref: '#/components/schemas/InsurancePolicyHistory' }
  /insurance/history/{historyId}/documents:
    get:
      operationId: listInsurancePolicyHistoryDocuments
      tags: [insurance]
      summary: List documents linked to a previous insurance policy
      security: [{ cookieAuth: [] }]
      parameters:
        - name: historyId
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Linked documents
          content:
            application/json:
              schema:
                type: array
