    UpdateOcrSettingsBody:
      type: object
      description: Body for `PATCH /settings/ocr` — admin-only. At least one field must be supplied.
      properties:
        ocrEnabled:
          type: boolean
          description: Master toggle for OCR auto-tag suggestions on the bulk historical-document importer.
        ocrDailyPageCap:
          type: integer
          minimum: 0
          description: Daily page cap (UTC). The scheduler stops claiming new work once the cap is hit.
    OrganizationSettings:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        address:
          type: string
          nullable: true
        contactEmail:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        timezone:
          type: string
        notificationPreferences:
          type: object
          additionalProperties:
            type: boolean
          nullable: true
        paymentsEnabled:
          type: boolean
        paymentsSurchargeEnabled:
          type: boolean
        paymentsSurchargePercentBp:
          type: integer
        paymentsAutoPayLagDays:
          type: integer
        expenditureThresholdCents:
          type: integer
          description: Minimum estCost (cents) above which work orders, work-order increases, and bid awards require an Adopted expenditure motion.
        gatedPolicies:
          type: array
          items:
            type: string
          description: Organization-settings keys that require an Adopted policy_change motion to modify.
        emergencyBypassEnabled:
          type: boolean
          description: When true, admins may bypass gates with a single-use bypass that auto-creates a ratification motion.
        ocrEnabled:
          type: boolean
          description: When true, the bulk historical-document importer enqueues OCR jobs and shows auto-tag suggestions. Admin-only to modify.
        ocrDailyPageCap:
          type: integer
          description: Daily cap on OCR pages processed; the scheduler stops once it has been hit until the next UTC day. Admin-only to modify.
        pastDueVotingThresholdDays:
          type: integer
          minimum: 0
          description: Number of days a charge can remain unpaid before the owner loses voting rights (ownership_status flips to suspended_voting). Default 60.
        currentTourVersion:
          type: integer
          minimum: 1
          description: |
            Org-wide welcome-tour version. Admins bump this after a major
            release so every user whose `tourVersionSeen` is below the new
            number sees the welcome tour again on next load.
      required:
        - id
        - name
        - timezone
